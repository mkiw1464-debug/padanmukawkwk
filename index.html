<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Tool Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans p-5">
    <div class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center text-blue-400 mb-8">Garena Account Tool</h1>
        
        <div class="space-y-4">
            <input id="token" type="text" placeholder="Masukkan Access Token" 
                class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="runAction('get_bind_info')" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold transition">Check Bind Info</button>
                <button onclick="runAction('check_links')" class="bg-purple-600 hover:bg-purple-700 p-3 rounded-lg font-semibold transition">Check Links</button>
                <button onclick="runAction('cancel_request')" class="bg-red-600 hover:bg-red-700 p-3 rounded-lg font-semibold transition">Cancel Request</button>
                <button onclick="alert('Sila gunakan fungsi send_otp di backend')" class="bg-gray-600 p-3 rounded-lg font-semibold cursor-not-allowed">Send OTP (More setup needed)</button>
            </div>
        </div>

        <div id="loader" class="mt-6 text-center hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
            <p class="text-sm text-slate-400 mt-2">Memproses...</p>
        </div>

        <div id="resultBox" class="mt-8 hidden">
            <h2 class="text-lg font-semibold mb-2 text-slate-300">Hasil Response:</h2>
            <pre id="jsonDisplay" class="bg-black p-5 rounded-xl text-green-400 text-xs overflow-x-auto border border-slate-700"></pre>
        </div>
    </div>

    <script>
        async function runAction(action) {
            const token = document.getElementById('token').value.trim();
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const jsonDisplay = document.getElementById('jsonDisplay');

            if (!token) return alert("Sila masukkan access token!");

            loader.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                const response = await fetch(`/.netlify/functions/garena_tool?action=${action}&token=${token}`);
                const data = await response.json();
                
                jsonDisplay.innerText = JSON.stringify(data, null, 2);
                resultBox.classList.remove('hidden');
            } catch (err) {
                alert("Ralat berlaku: " + err.message);
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
