<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Garena Bind Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-lg mx-auto bg-slate-800 p-6 rounded-lg shadow-xl">
        <h1 class="text-2xl font-bold mb-4">Garena Bind Info</h1>
        <input id="token" type="text" placeholder="Masukkan Access Token" class="w-full p-2 rounded bg-slate-700 mb-4 border border-slate-600 focus:outline-none focus:border-blue-500">
        <button onclick="checkBind()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold">SEMAK</button>
        
        <div id="result" class="mt-6 hidden">
            <p class="text-sm text-slate-400 mb-2">Response:</p>
            <pre id="json-output" class="bg-black p-4 rounded text-green-400 text-xs overflow-x-auto"></pre>
        </div>
    </div>

    <script>
        async function checkBind() {
            const token = document.getElementById('token').value;
            const resDiv = document.getElementById('result');
            const output = document.getElementById('json-output');
            
            if(!token) return alert("Masukkan token!");

            resDiv.classList.remove('hidden');
            output.innerText = "Loading...";

            try {
                const response = await fetch(`/.netlify/functions/get_bind?token=${token}`);
                const data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
